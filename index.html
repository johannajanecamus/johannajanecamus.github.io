    <!-- Google / Search Engine Tags -->

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://johannajanecamus.github.io" />

    <meta property="og:title" content="Johanna Jane Camus | Portfolio" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Johanna Jane Camus | Portfolio" />
    <meta name="twitter:description" content="Johanna Jane Camus - Full-stack Developer Portfolio" />
    <script>
      // GitHub Pages SPA redirect handler
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
